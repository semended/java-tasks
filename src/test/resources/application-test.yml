server:
  port: 0

app:
  jwt:
    secret: "test-secret-key-for-jwt-signing-at-least-256-bits-long-test!!"
    expiration-ms: 1800000
  pepper: "mipt-pepper-2026"
  external:
    base-url: http://localhost:${local.server.port}/external/v1

resilience4j:
  ratelimiter:
    instances:
      taskGateway:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 0s
  circuitbreaker:
    instances:
      taskGateway:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 2s
        permitted-number-of-calls-in-half-open-state: 3
