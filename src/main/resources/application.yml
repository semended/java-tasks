server:
  port: 8080

spring:
  application:
    name: todo-list-manager
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

app:
  name: Todo List Manager
  version: 1.0.0
  api-version: "2.0.0"
  attachments:
    dir: ./attachments

springdoc:
  swagger-ui:
    path: /swagger-ui.html
