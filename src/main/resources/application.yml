server:
  port: 8080

spring:
  application:
    name: todo-list-manager
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  name: Todo List Manager
  version: 1.0.0
  api-version: "2.0.0"
  attachments:
    dir: ./attachments

springdoc:
  swagger-ui:
    path: /swagger-ui.html
